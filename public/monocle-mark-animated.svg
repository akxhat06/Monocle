<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160" fill="none" role="img" aria-label="Monocle — one lens, many views">
  <defs>
    <linearGradient id="gCore" x1="44" y1="44" x2="116" y2="116" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset="0.5" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="gRing1" x1="80" y1="20" x2="80" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a5b4fc" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#06b6d4" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="gRing2" x1="140" y1="80" x2="20" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#818cf8" stop-opacity="0.3"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    .r1 { transform-origin: 80px 80px; animation: sCW  20s linear infinite; }
    .r2 { transform-origin: 80px 80px; animation: sCCW 12s linear infinite; }
    @keyframes sCW  { to { transform: rotate(360deg);  } }
    @keyframes sCCW { to { transform: rotate(-360deg); } }

    .hex { transform-origin: 80px 80px; animation: hBr 4s ease-in-out infinite; }
    @keyframes hBr {
      0%,100% { opacity:.85; transform:scale(1);     }
      50%      { opacity:1;   transform:scale(1.025); }
    }

    .sp {
      stroke-dasharray: 120;
      stroke-dashoffset: 120;
      animation: spDr 2.6s cubic-bezier(.4,0,.2,1) infinite;
    }
    @keyframes spDr {
      0%   { stroke-dashoffset: 120;  opacity:.2; }
      40%  { stroke-dashoffset: 0;    opacity:1;  }
      75%  { stroke-dashoffset: 0;    opacity:.9; }
      100% { stroke-dashoffset:-120;  opacity:0;  }
    }

    .co { transform-origin:80px 80px; animation:coP 2.2s ease-in-out infinite; }
    @keyframes coP {
      0%,100%{ opacity:1;   transform:scale(1);    }
      50%    { opacity:.7;  transform:scale(.92);  }
    }

    .rp { transform-origin:80px 80px; animation:rpO 2.8s ease-out infinite; }
    @keyframes rpO {
      0%  { transform:scale(1);   stroke-opacity:.5; }
      70% { transform:scale(2.8); stroke-opacity:0;  }
      100%{ transform:scale(2.8); stroke-opacity:0;  }
    }

    .nr { transform-box:fill-box; transform-origin:center; animation:nrP 2.4s ease-out infinite; }
    @keyframes nrP {
      0%  { transform:scale(1);   opacity:.45; }
      60% { transform:scale(2.2); opacity:0;   }
      100%{ transform:scale(2.2); opacity:0;   }
    }

    .b  { transform-box:fill-box; transform-origin:center bottom; }
    .b0 { animation:bBr 1.8s ease-in-out 0.00s infinite; }
    .b1 { animation:bBr 1.8s ease-in-out 0.12s infinite; }
    .b2 { animation:bBr 1.8s ease-in-out 0.24s infinite; }
    .b3 { animation:bBr 1.8s ease-in-out 0.08s infinite; }
    .b4 { animation:bBr 1.8s ease-in-out 0.18s infinite; }
    .b5 { animation:bBr 1.8s ease-in-out 0.06s infinite; }
    .b6 { animation:bBr 1.8s ease-in-out 0.30s infinite; }
    @keyframes bBr {
      0%,100%{ transform:scaleY(1);    opacity:.85; }
      50%    { transform:scaleY(.45);  opacity:.55; }
    }

    @media (prefers-reduced-motion:reduce){
      .r1,.r2,.hex,.sp,.co,.rp,.nr,.b0,.b1,.b2,.b3,.b4,.b5,.b6{ animation:none!important; }
      .sp{ stroke-dashoffset:0!important; opacity:.8!important; }
    }
  </style>

  <!-- Background glow -->
  <circle cx="80" cy="80" r="72" fill="url(#bgGlow)"/>

  <!-- Outer ring (slow clockwise) -->
  <g class="r1">
    <circle cx="80" cy="80" r="58" stroke="url(#gRing1)" stroke-width="1"
      stroke-dasharray="6 18" stroke-linecap="round" opacity="0.5"/>
    <!-- Top node -->
    <g filter="url(#glow)">
      <circle cx="80" cy="22" r="4.5" fill="#a5b4fc" opacity="0.9"/>
      <circle cx="80" cy="22" r="8" class="nr" stroke="#a5b4fc" stroke-width="1" stroke-opacity="0.25"/>
    </g>
    <!-- Bottom node -->
    <circle cx="80" cy="138" r="3.5" fill="#22d3ee" opacity="0.7" filter="url(#glow)"/>
  </g>

  <!-- Inner ring (faster counter-clockwise) -->
  <g class="r2">
    <circle cx="80" cy="80" r="42" stroke="url(#gRing2)" stroke-width="1.2"
      stroke-dasharray="4 12" stroke-linecap="round" opacity="0.6"/>
    <!-- Right node -->
    <g filter="url(#glow)">
      <circle cx="122" cy="80" r="4" fill="#22d3ee" opacity="0.85"/>
      <circle cx="122" cy="80" r="7.5" class="nr" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.22"/>
    </g>
  </g>

  <!-- Hexagonal core -->
  <g class="hex" filter="url(#glow2)">
    <polygon points="80,44 107,59 107,89 80,104 53,89 53,59"
      stroke="url(#gCore)" stroke-width="1.8" opacity="0.75"/>
    <polygon points="80,56 96,65 96,83 80,92 64,83 64,65"
      stroke="url(#gCore)" stroke-width="1" opacity="0.4"/>
    <line x1="80"  y1="44"  x2="80"  y2="56"  stroke="#818cf8" stroke-width="0.8" opacity="0.35"/>
    <line x1="107" y1="59"  x2="96"  y2="65"  stroke="#818cf8" stroke-width="0.8" opacity="0.35"/>
    <line x1="107" y1="89"  x2="96"  y2="83"  stroke="#818cf8" stroke-width="0.8" opacity="0.35"/>
    <line x1="80"  y1="104" x2="80"  y2="92"  stroke="#818cf8" stroke-width="0.8" opacity="0.35"/>
    <line x1="53"  y1="89"  x2="64"  y2="83"  stroke="#818cf8" stroke-width="0.8" opacity="0.35"/>
    <line x1="53"  y1="59"  x2="64"  y2="65"  stroke="#818cf8" stroke-width="0.8" opacity="0.35"/>
  </g>

  <!-- Sparkline -->
  <path class="sp"
    d="M36 88 C48 84 56 72 68 70 S80 76 92 70 S104 60 118 58 S128 62 132 60"
    stroke="#22d3ee" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
    filter="url(#glow)"/>

  <!-- Core dot -->
  <g class="co" filter="url(#glow)">
    <circle cx="80" cy="80" r="7" fill="url(#gCore)" opacity="0.9"/>
    <circle cx="80" cy="80" r="3.5" fill="#e0e7ff" opacity="0.95"/>
  </g>

  <!-- Ripple -->
  <circle class="rp" cx="80" cy="80" r="12" stroke="#818cf8" stroke-width="1"/>

  <!-- Bars -->
  <g opacity="0.85">
    <rect class="b b0" x="54"  y="108" width="5" height="10" rx="1.5" fill="url(#gCore)"/>
    <rect class="b b1" x="62"  y="102" width="5" height="16" rx="1.5" fill="url(#gCore)"/>
    <rect class="b b2" x="70"  y="110" width="5" height="8"  rx="1.5" fill="url(#gCore)"/>
    <rect class="b b3" x="78"  y="98"  width="5" height="20" rx="1.5" fill="url(#gCore)"/>
    <rect class="b b4" x="86"  y="106" width="5" height="12" rx="1.5" fill="url(#gCore)"/>
    <rect class="b b5" x="94"  y="100" width="5" height="18" rx="1.5" fill="url(#gCore)"/>
    <rect class="b b6" x="102" y="109" width="5" height="9"  rx="1.5" fill="url(#gCore)"/>
  </g>
</svg>
