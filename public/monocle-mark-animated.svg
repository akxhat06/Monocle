<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160" fill="none" role="img" aria-label="Monocle  one lens, many views">
  <defs>
    <linearGradient id="mm-lens-grad" x1="80" y1="28" x2="80" y2="132" gradientUnits="userSpaceOnUse">
      <stop stop-color="#86efac"/>
      <stop offset="1" stop-color="#15803d"/>
    </linearGradient>
    <filter id="mm-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <style>
    .mm-orbit { transform-origin: 80px 80px; animation: mm-orbit-spin 22s linear infinite; }
    @keyframes mm-orbit-spin { to { transform: rotate(360deg); } }
    .mm-view-a { animation: mm-view-pulse 3s ease-in-out infinite; }
    .mm-view-b { animation: mm-view-pulse 3s ease-in-out infinite 0.45s; }
    .mm-view-c { animation: mm-view-pulse 3s ease-in-out infinite 0.9s; }
    @keyframes mm-view-pulse { 0%, 100% { opacity: 0.72; } 50% { opacity: 1; } }
    .mm-bar { transform-origin: center bottom; transform-box: fill-box; animation: mm-bar-bounce 1.5s ease-in-out infinite; }
    .mm-view-a .mm-bar:nth-child(2) { animation-delay: 0s; }
    .mm-view-a .mm-bar:nth-child(3) { animation-delay: 0.1s; }
    .mm-view-a .mm-bar:nth-child(4) { animation-delay: 0.2s; }
    .mm-view-b .mm-bar:nth-child(2) { animation-delay: 0.15s; }
    .mm-view-b .mm-bar:nth-child(3) { animation-delay: 0.25s; }
    .mm-view-b .mm-bar:nth-child(4) { animation-delay: 0.35s; }
    .mm-view-c .mm-bar:nth-child(2) { animation-delay: 0.3s; }
    .mm-view-c .mm-bar:nth-child(3) { animation-delay: 0.4s; }
    .mm-view-c .mm-bar:nth-child(4) { animation-delay: 0.5s; }
    @keyframes mm-bar-bounce { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(0.5); } }
    .mm-lens { animation: mm-lens-soft 3.2s ease-in-out infinite; }
    @keyframes mm-lens-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.88; } }
    .mm-lens-core { animation: mm-core-pulse 2.2s ease-in-out infinite; }
    @keyframes mm-core-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.55; } }
    .mm-spark { stroke-dasharray: 56; stroke-dashoffset: 56; animation: mm-spark-draw 2.8s ease-in-out infinite; }
    @keyframes mm-spark-draw {
      0% { stroke-dashoffset: 56; opacity: 0.3; }
      35% { stroke-dashoffset: 0; opacity: 0.55; }
      100% { stroke-dashoffset: 0; opacity: 0.3; }
    }
    @media (prefers-reduced-motion: reduce) {
      .mm-orbit, .mm-view-a, .mm-view-b, .mm-view-c, .mm-bar, .mm-lens, .mm-lens-core, .mm-spark { animation: none !important; }
      .mm-spark { stroke-dashoffset: 0 !important; opacity: 0.45 !important; }
    }
  </style>
  <g class="mm-orbit">
    <circle cx="80" cy="80" r="54" stroke="url(#mm-lens-grad)" stroke-width="1.2" stroke-dasharray="8 14" opacity="0.55"/>
  </g>
  <g class="mm-view mm-view-a" transform="translate(80 22)">
    <rect x="-9" y="-7" width="18" height="14" rx="3" stroke="#4ade80" stroke-width="1" opacity="0.5"/>
    <rect x="-6" y="1" width="3" height="5" rx="0.5" fill="#4ade80" class="mm-bar"/>
    <rect x="-1" y="-1" width="3" height="7" rx="0.5" fill="#4ade80" class="mm-bar"/>
    <rect x="4" y="2" width="3" height="4" rx="0.5" fill="#4ade80" class="mm-bar"/>
  </g>
  <g class="mm-view mm-view-b" transform="translate(128 96)">
    <rect x="-9" y="-7" width="18" height="14" rx="3" stroke="#4ade80" stroke-width="1" opacity="0.5"/>
    <rect x="-6" y="1" width="3" height="5" rx="0.5" fill="#4ade80" class="mm-bar"/>
    <rect x="-1" y="-1" width="3" height="7" rx="0.5" fill="#4ade80" class="mm-bar"/>
    <rect x="4" y="2" width="3" height="4" rx="0.5" fill="#4ade80" class="mm-bar"/>
  </g>
  <g class="mm-view mm-view-c" transform="translate(32 96)">
    <rect x="-9" y="-7" width="18" height="14" rx="3" stroke="#4ade80" stroke-width="1" opacity="0.5"/>
    <rect x="-6" y="1" width="3" height="5" rx="0.5" fill="#4ade80" class="mm-bar"/>
    <rect x="-1" y="-1" width="3" height="7" rx="0.5" fill="#4ade80" class="mm-bar"/>
    <rect x="4" y="2" width="3" height="4" rx="0.5" fill="#4ade80" class="mm-bar"/>
  </g>
  <g filter="url(#mm-glow)" class="mm-lens">
    <circle cx="80" cy="80" r="40" stroke="url(#mm-lens-grad)" stroke-width="2.4"/>
    <circle cx="80" cy="80" r="28" stroke="#4ade80" stroke-width="1.3" opacity="0.65"/>
    <circle cx="80" cy="80" r="5" fill="#4ade80" class="mm-lens-core"/>
  </g>
  <path class="mm-spark" d="M52 88 Q64 82 72 84 T88 78 T104 72" stroke="#4ade80" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
</svg>
