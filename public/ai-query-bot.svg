<svg xmlns="http://www.w3.org/2000/svg" viewBox="-10 -6 148 142" fill="none" aria-hidden="true" overflow="visible">
  <title>AI-powered query</title>
  <defs>
    <clipPath id="aq-clip-lens">
      <circle cx="52" cy="52" r="25.5"/>
    </clipPath>
    <linearGradient id="aq-lens-outer" x1="40" y1="36" x2="72" y2="72" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1f3528"/>
      <stop offset="0.45" stop-color="#14261c"/>
      <stop offset="1" stop-color="#070d0a"/>
    </linearGradient>
    <radialGradient id="aq-lens-inner" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#d1fae5"/>
      <stop offset="35%" stop-color="#86efac"/>
      <stop offset="70%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#14532d"/>
    </radialGradient>
    <linearGradient id="aq-lens-spec" x1="38" y1="38" x2="58" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="0.35" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="aq-handle" x1="78" y1="78" x2="108" y2="108" gradientUnits="userSpaceOnUse">
      <stop stop-color="#86efac"/>
      <stop offset="0.4" stop-color="#4ade80"/>
      <stop offset="1" stop-color="#166534"/>
    </linearGradient>
    <linearGradient id="aq-handle-shine" x1="76" y1="76" x2="92" y2="92" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ecfdf5" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ecfdf5" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="aq-ground-shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.5"/>
      <stop offset="0.65" stop-color="#000000" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="aq-bloom" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Box-shadow style elevation: dark cast + green ambient -->
    <filter id="aq-float-shadow" x="-55%" y="-55%" width="210%" height="210%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="11" flood-color="#000000" flood-opacity="0.52" result="s1"/>
      <feDropShadow in="SourceAlpha" dx="0" dy="4" stdDeviation="5" flood-color="#14532d" flood-opacity="0.45" result="s2"/>
      <feDropShadow in="SourceAlpha" dx="-2" dy="6" stdDeviation="14" flood-color="#000000" flood-opacity="0.22" result="s3"/>
      <feMerge>
        <feMergeNode in="s3"/>
        <feMergeNode in="s1"/>
        <feMergeNode in="s2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      @keyframes aq-breathe {
        0%, 100% { transform: scale(1); opacity: 0.72; }
        50% { transform: scale(1.08); opacity: 1; }
      }
      @keyframes aq-wave {
        0% { stroke-dashoffset: 24; opacity: 0.45; }
        50% { stroke-dashoffset: 0; opacity: 1; }
        100% { stroke-dashoffset: -24; opacity: 0.45; }
      }
      @keyframes aq-node {
        0%, 100% { opacity: 0.35; transform: scale(0.92); }
        50% { opacity: 1; transform: scale(1); }
      }
      @keyframes aq-edge {
        0%, 100% { stroke-opacity: 0.2; }
        50% { stroke-opacity: 0.55; }
      }
      @keyframes aq-star {
        0%, 100% { opacity: 0.35; transform: scale(0.9); }
        50% { opacity: 1; transform: scale(1.05); }
      }
      .aq-glow {
        transform-origin: 52px 52px;
        animation: aq-breathe 3.2s ease-in-out infinite;
      }
      .aq-wave {
        animation: aq-wave 2.8s ease-in-out infinite;
      }
      .aq-neural .aq-edge {
        animation: aq-edge 2.4s ease-in-out infinite;
      }
      .aq-neural .aq-n1 { transform-origin: 44px 45px; animation: aq-node 2.2s ease-in-out infinite 0s; }
      .aq-neural .aq-n2 { transform-origin: 61px 44px; animation: aq-node 2.2s ease-in-out infinite 0.35s; }
      .aq-neural .aq-n3 { transform-origin: 59px 58px; animation: aq-node 2.2s ease-in-out infinite 0.7s; }
      .aq-neural .aq-n4 { transform-origin: 42px 57px; animation: aq-node 2.2s ease-in-out infinite 1.05s; }
      .aq-neural .aq-hub { transform-origin: 52px 51px; animation: aq-node 2s ease-in-out infinite 0.5s; }
      .aq-s1 { transform-origin: 94px 26px; animation: aq-star 2s ease-in-out infinite; }
      .aq-s2 { transform-origin: 108px 38px; animation: aq-star 2.4s ease-in-out infinite 0.4s; }
      .aq-s3 { transform-origin: 100px 18px; animation: aq-star 2.1s ease-in-out infinite 0.8s; }
      @media (prefers-reduced-motion: reduce) {
        .aq-glow, .aq-wave, .aq-neural .aq-edge, .aq-neural circle, .aq-s1, .aq-s2, .aq-s3 {
          animation: none !important;
        }
        .aq-glow { opacity: 0.85; transform: none; }
        .aq-neural .aq-edge { stroke-opacity: 0.4; }
        .aq-neural circle { opacity: 0.85; transform: none; }
        .aq-s1, .aq-s2, .aq-s3 { opacity: 0.75; transform: none; }
      }
    </style>
  </defs>

  <!-- Soft floor shadow (3D “floating” base) -->
  <ellipse cx="72" cy="118" rx="38" ry="10" fill="url(#aq-ground-shadow)" opacity="0.85"/>

  <circle cx="64" cy="64" r="60" fill="#09090b" opacity="0.35"/>

  <g filter="url(#aq-float-shadow)">
    <!-- Lens outer shell: darker bottom-right for sphere depth -->
    <circle cx="52" cy="52" r="28" fill="url(#aq-lens-outer)" stroke="#2d4a38" stroke-width="1.35"/>
    <circle cx="52" cy="52" r="28" stroke="url(#aq-handle)" stroke-width="2.25" stroke-opacity="0.4" fill="none"/>
    <!-- Inner bevel ring -->
    <circle cx="52" cy="52" r="26" stroke="#000000" stroke-opacity="0.35" stroke-width="2" fill="none"/>

    <circle class="aq-glow" cx="52" cy="52" r="20" fill="url(#aq-lens-inner)" opacity="0.92" filter="url(#aq-bloom)"/>

    <!-- Specular “glass” highlight -->
    <circle cx="52" cy="52" r="22" fill="url(#aq-lens-spec)" pointer-events="none"/>

    <g class="aq-neural" clip-path="url(#aq-clip-lens)">
      <path
        class="aq-edge"
        d="M 44 45 L 61 44 L 59 58 L 42 57 Z M 52 51 L 44 45 M 52 51 L 61 44 M 52 51 L 59 58 M 52 51 L 42 57"
        stroke="#86efac"
        stroke-width="1.15"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"
      />
      <circle class="aq-n1" cx="44" cy="45" r="3" fill="#d1fae5"/>
      <circle class="aq-n2" cx="61" cy="44" r="3" fill="#a7f3d0"/>
      <circle class="aq-n3" cx="59" cy="58" r="3" fill="#6ee7b7"/>
      <circle class="aq-n4" cx="42" cy="57" r="3" fill="#a7f3d0"/>
      <circle class="aq-hub" cx="52" cy="51" r="4" fill="#ecfdf5" stroke="#22c55e" stroke-width="1"/>
    </g>

    <path
      class="aq-wave"
      d="M 36 50 C 42 44, 48 44, 52 50 C 56 56, 62 56, 68 50"
      stroke="#ecfdf5"
      stroke-width="2.25"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"
      stroke-dasharray="10 14"
      opacity="0.95"
    />

    <!-- Handle: thick body + highlight stroke for cylinder -->
    <path d="M 74 74 L 102 102" stroke="url(#aq-handle)" stroke-width="6" stroke-linecap="round"/>
    <path d="M 76 76 L 99 99" stroke="url(#aq-handle-shine)" stroke-width="2" stroke-linecap="round"/>
    <path d="M 74 74 L 102 102" stroke="#bbf7d0" stroke-width="1.25" stroke-linecap="round" opacity="0.35"/>

    <g fill="none" stroke="#a7f3d0" stroke-linecap="round" stroke-width="1.85">
      <g class="aq-s1">
        <path d="M 94 22v7M90.5 25.5h7"/>
      </g>
      <g class="aq-s2">
        <path d="M 108 34v6M105 37h6"/>
      </g>
      <g class="aq-s3">
        <path d="M 100 15v5M97.5 17.5h5"/>
      </g>
    </g>
  </g>
</svg>
