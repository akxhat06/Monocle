<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" fill="none" overflow="visible" aria-hidden="true">
  <defs>
    <!-- Body gradient -->
    <radialGradient id="body-grad" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#f5f3ff"/>
      <stop offset="45%" stop-color="#ede9fe"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </radialGradient>

    <!-- Face panel -->
    <linearGradient id="face-grad" x1="48" y1="68" x2="112" y2="108" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0d0b1e"/>
    </linearGradient>

    <!-- Eye glows -->
    <radialGradient id="eye-l-g" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="35%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </radialGradient>
    <radialGradient id="eye-r-g" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="35%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </radialGradient>

    <!-- Bubble left -->
    <linearGradient id="bub-l-g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>

    <!-- Bubble right -->
    <linearGradient id="bub-r-g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0abfc"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>

    <!-- Aura glow -->
    <radialGradient id="aura" cx="50%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>

    <!-- Ground -->
    <radialGradient id="ground" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>

    <!-- Scan sweep -->
    <linearGradient id="scan-g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#38bdf8" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#38bdf8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </linearGradient>

    <!-- Antenna tip -->
    <radialGradient id="ant-g" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0abfc"/>
      <stop offset="60%" stop-color="#c026d3"/>
      <stop offset="100%" stop-color="#86198f"/>
    </radialGradient>

    <!-- Filters -->
    <filter id="f-body" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#4c1d95" flood-opacity="0.35"/>
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#ede9fe" flood-opacity="0.5"/>
    </filter>
    <filter id="f-eye" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="f-ant" x="-300%" y="-300%" width="700%" height="700%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="f-bub" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#4c1d95" flood-opacity="0.3"/>
    </filter>
    <filter id="f-ring" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>

    <clipPath id="face-clip">
      <rect x="46" y="68" width="68" height="38" rx="14"/>
    </clipPath>

    <style>
      /* Float */
      .bot  { transform-origin: 80px 95px; animation: float 3.6s ease-in-out infinite; }
      @keyframes float {
        0%,100% { transform: translateY(0);   }
        50%      { transform: translateY(-8px);}
      }

      /* Ground shadow breathe */
      .shadow { transform-origin: 80px 138px; animation: shadow 3.6s ease-in-out infinite; }
      @keyframes shadow {
        0%,100% { transform: scaleX(1);    opacity:1;   }
        50%      { transform: scaleX(0.65); opacity:0.4; }
      }

      /* Orbit ring spin */
      .ring1 { transform-origin: 80px 95px; animation: spin-cw  7s  linear infinite; }
      .ring2 { transform-origin: 80px 95px; animation: spin-ccw 5s  linear infinite; }
      @keyframes spin-cw  { to { transform: rotate(360deg);  } }
      @keyframes spin-ccw { to { transform: rotate(-360deg); } }

      /* Antenna blink */
      .ant-tip { animation: ant 1.4s ease-in-out infinite; }
      @keyframes ant {
        0%,100% { opacity:1;   r:4; }
        50%      { opacity:0.2; r:2.5; }
      }

      /* Eye blink */
      .eye-l { animation: blink 4s ease-in-out infinite 0.5s; }
      .eye-r { animation: blink 4s ease-in-out infinite 0.8s; }
      @keyframes blink {
        0%,42%,46%,100% { transform: scaleY(1);   }
        44%              { transform: scaleY(0.08);}
      }

      /* Eye glow pulse */
      .eye-glow { animation: eye-pulse 2s ease-in-out infinite; }
      @keyframes eye-pulse {
        0%,100% { opacity:0.85; }
        50%      { opacity:1;   }
      }

      /* Scan sweep across face panel */
      .scan { animation: scan 2.6s linear infinite; }
      @keyframes scan {
        0%   { transform: translateX(-72px); opacity:0;   }
        8%   { opacity:1; }
        92%  { opacity:1; }
        100% { transform: translateX(72px);  opacity:0;   }
      }

      /* Mouth talking */
      .mouth { animation: talk 0.9s ease-in-out infinite; }
      @keyframes talk {
        0%,100% { d: path("M62 102 Q80 106 98 102"); }
        50%      { d: path("M62 102 Q80 110 98 102"); }
      }

      /* Left chat bubble */
      .bub-l { transform-origin: 20px 68px; animation: bpop 3s ease-in-out infinite 0.4s; }
      /* Right bubble */
      .bub-r { transform-origin: 140px 72px; animation: bpop 3s ease-in-out infinite 1s; }
      @keyframes bpop {
        0%,100% { transform: scale(1)    translateY(0);    opacity:1;   }
        45%      { transform: scale(1.07) translateY(-5px); opacity:1;   }
        85%      { transform: scale(0.97) translateY(1px);  opacity:0.9; }
      }

      /* Particles */
      .p1 { animation: pfloat 3.5s ease-in-out infinite 0s;   }
      .p2 { animation: pfloat 3.5s ease-in-out infinite 0.9s; }
      .p3 { animation: pfloat 3.5s ease-in-out infinite 1.8s; }
      .p4 { animation: pfloat 3.5s ease-in-out infinite 2.7s; }
      @keyframes pfloat {
        0%    { opacity:0; transform: translate(0,0)      scale(0);   }
        20%   { opacity:0.8; transform: translate(0,0)    scale(1);   }
        80%   { opacity:0.3; transform: translate(var(--tx),var(--ty)) scale(0.7); }
        100%  { opacity:0;   transform: translate(var(--tx),var(--ty)) scale(0);   }
      }

      /* Aura pulse */
      .aura { animation: aura-pulse 3.6s ease-in-out infinite; }
      @keyframes aura-pulse {
        0%,100% { opacity:0.7; transform: scale(1);    }
        50%      { opacity:0.3; transform: scale(1.12); }
      }
    </style>
  </defs>

  <!-- Ground shadow -->
  <ellipse class="shadow" cx="80" cy="138" rx="32" ry="6" fill="url(#ground)"/>

  <!-- Aura behind body -->
  <ellipse class="aura" cx="80" cy="96" rx="46" ry="44" fill="url(#aura)"/>

  <!-- Orbit rings (behind bot) -->
  <g class="ring1" opacity="0.18">
    <ellipse cx="80" cy="95" rx="56" ry="22" stroke="#a78bfa" stroke-width="1.2" stroke-dasharray="4 6"/>
  </g>
  <g class="ring2" opacity="0.12">
    <ellipse cx="80" cy="95" rx="42" ry="16" stroke="#c084fc" stroke-width="1" stroke-dasharray="3 8"/>
  </g>

  <!-- ── Left chat bubble ── -->
  <g class="bub-l" filter="url(#f-bub)">
    <rect x="4" y="52" width="40" height="32" rx="10" fill="url(#bub-l-g)"/>
    <rect x="11" y="59" width="26" height="3"   rx="1.5" fill="#fff" opacity="0.9"/>
    <rect x="11" y="65" width="18" height="3"   rx="1.5" fill="#fff" opacity="0.6"/>
    <rect x="11" y="71" width="22" height="2.5" rx="1.25" fill="#fff" opacity="0.35"/>
    <path d="M12 84 L6 92 L22 84Z" fill="url(#bub-l-g)"/>
  </g>

  <!-- ── Right chart bubble ── -->
  <g class="bub-r" filter="url(#f-bub)">
    <rect x="116" y="54" width="40" height="34" rx="10" fill="url(#bub-r-g)"/>
    <rect x="123" y="75" width="5" height="9"  rx="1.5" fill="#fff" opacity="0.75"/>
    <rect x="130" y="68" width="5" height="16" rx="1.5" fill="#fff" opacity="0.92"/>
    <rect x="137" y="71" width="5" height="13" rx="1.5" fill="#ede9fe" opacity="0.88"/>
    <!-- tiny x-axis line -->
    <line x1="121" y1="84" x2="145" y2="84" stroke="#fff" stroke-width="0.8" opacity="0.3"/>
    <path d="M138 88 L144 96 L128 88Z" fill="url(#bub-r-g)"/>
  </g>

  <!-- ── Bot ── -->
  <g class="bot" filter="url(#f-body)">

    <!-- Antenna -->
    <line x1="80" y1="52" x2="80" y2="40" stroke="#c4b5fd" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="80" y1="40" x2="72" y2="33" stroke="#c4b5fd" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="80" y1="40" x2="88" y2="33" stroke="#c4b5fd" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <circle class="ant-tip" cx="80" cy="40" r="4" fill="url(#ant-g)" filter="url(#f-ant)"/>
    <circle cx="72" cy="33" r="2" fill="#a78bfa" opacity="0.6"/>
    <circle cx="88" cy="33" r="2" fill="#a78bfa" opacity="0.6"/>

    <!-- Head -->
    <rect x="42" y="52" width="76" height="76" rx="28" fill="url(#body-grad)"/>

    <!-- Ear bolts -->
    <circle cx="42" cy="90" r="6" fill="#ddd6fe" stroke="#a78bfa" stroke-width="1.5"/>
    <circle cx="42" cy="90" r="2.5" fill="#7c3aed"/>
    <circle cx="118" cy="90" r="6" fill="#ddd6fe" stroke="#a78bfa" stroke-width="1.5"/>
    <circle cx="118" cy="90" r="2.5" fill="#7c3aed"/>

    <!-- Face panel -->
    <rect x="46" y="68" width="68" height="38" rx="14" fill="url(#face-grad)"/>
    <!-- Face top gloss -->
    <rect x="46" y="68" width="68" height="12" rx="14" fill="#fff" opacity="0.05"/>

    <!-- Scan sweep (clipped to face) -->
    <rect class="scan" x="46" y="68" width="68" height="38" rx="14"
      fill="url(#scan-g)" clip-path="url(#face-clip)" opacity="0.45"/>

    <!-- Eyes with blink + glow -->
    <g class="eye-glow" filter="url(#f-eye)">
      <g class="eye-l" style="transform-origin:63px 88px">
        <rect x="55" y="76" width="16" height="24" rx="8" fill="url(#eye-l-g)"/>
        <rect x="58" y="79" width="5"  height="6"  rx="2.5" fill="#fff" opacity="0.6"/>
      </g>
      <g class="eye-r" style="transform-origin:97px 88px">
        <rect x="89" y="76" width="16" height="24" rx="8" fill="url(#eye-r-g)"/>
        <rect x="92" y="79" width="5"  height="6"  rx="2.5" fill="#fff" opacity="0.6"/>
      </g>
    </g>

    <!-- Mouth -->
    <path class="mouth" d="M62 102 Q80 108 98 102"
      stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round" fill="none"/>

    <!-- Chin vent lines -->
    <rect x="68" y="116" width="24" height="2" rx="1" fill="#c4b5fd" opacity="0.25"/>
    <rect x="72" y="120" width="16" height="2" rx="1" fill="#c4b5fd" opacity="0.15"/>
  </g>

  <!-- Floating particles -->
  <circle class="p1" cx="52" cy="108" r="3"   fill="#a78bfa" style="--tx:-14px;--ty:-22px"/>
  <circle class="p2" cx="108" cy="104" r="2.5" fill="#38bdf8" style="--tx:16px;--ty:-20px"/>
  <circle class="p3" cx="80"  cy="126" r="2"   fill="#c084fc" style="--tx:10px;--ty:-28px"/>
  <circle class="p4" cx="60"  cy="120" r="2.2" fill="#86efac" style="--tx:-12px;--ty:-24px"/>
</svg>
