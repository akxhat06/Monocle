<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none" aria-hidden="true" overflow="visible">
  <title>AI analytics chat — 3D pop</title>
  <defs>
    <linearGradient id="aca-purp-c" x1="0" y1="40" x2="36" y2="78" gradientUnits="userSpaceOnUse">
      <stop stop-color="#c084fc"/>
      <stop offset="0.5" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="aca-purp-d" x1="84" y1="44" x2="126" y2="84" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f0abfc"/>
      <stop offset="0.45" stop-color="#a855f7"/>
      <stop offset="1" stop-color="#581c87"/>
    </linearGradient>
    <linearGradient id="aca-dome" x1="52" y1="56" x2="88" y2="104" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="0.45" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="aca-visor" x1="44" y1="76" x2="84" y2="100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1e1b2e"/>
      <stop offset="0.5" stop-color="#0f0d16"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <radialGradient id="aca-eye-l" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="0.55" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#0369a1"/>
    </radialGradient>
    <radialGradient id="aca-eye-r" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#a5f3fc"/>
      <stop offset="0.5" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#0e7490"/>
    </radialGradient>
    <!-- Lighter shadow on purple bubbles -->
    <filter id="aca-shade-p" x="-25%" y="-25%" width="150%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="2" stdDeviation="1.8" flood-color="#5b21b6" flood-opacity="0.2"/>
      <feDropShadow dx="-1" dy="-1" stdDeviation="1" flood-color="#faf5ff" flood-opacity="0.18"/>
    </filter>
    <!-- Softer shadow under head -->
    <filter id="aca-shade-bot" x="-25%" y="-25%" width="150%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#64748b" flood-opacity="0.12"/>
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#ffffff" flood-opacity="0.45"/>
    </filter>
    <filter id="aca-eye-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .aca-b3 { transform-origin: 22px 59px; animation: aca-pop 2.55s ease-in-out infinite 0.65s; }
      .aca-b4 { transform-origin: 107px 64px; animation: aca-pop 2.5s ease-in-out infinite 0.95s; }
      .aca-bot { transform-origin: 64px 87px; animation: aca-bot 3.2s ease-in-out infinite; }
      .aca-eye-pulse { animation: aca-eye 2s ease-in-out infinite; }
      .aca-chart { transform-origin: 28px 97px; animation: aca-pop 2.8s ease-in-out infinite 0.5s; }
      @keyframes aca-pop {
        0%, 100% { transform: scale(1) translateY(0); }
        45% { transform: scale(1.1) translateY(-3px); }
      }
      @keyframes aca-bot {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-4px); }
      }
      @keyframes aca-eye {
        0%, 100% { opacity: 0.88; filter: brightness(1); }
        50% { opacity: 1; filter: brightness(1.25); }
      }
      @media (prefers-reduced-motion: reduce) {
        .aca-b3, .aca-b4, .aca-bot, .aca-eye-pulse, .aca-chart {
          animation: none !important;
        }
      }
    </style>
  </defs>

  <g filter="url(#aca-shade-p)" class="aca-b3">
    <rect x="6" y="46" width="34" height="26" rx="8" fill="url(#aca-purp-c)"/>
    <rect x="13" y="53" width="20" height="3" rx="1.5" fill="#ffffff" opacity="0.88"/>
    <rect x="13" y="59" width="14" height="3" rx="1.5" fill="#ffffff" opacity="0.65"/>
    <rect x="13" y="65" width="18" height="3" rx="1.5" fill="#ffffff" opacity="0.45"/>
  </g>

  <g filter="url(#aca-shade-p)" class="aca-b4">
    <rect x="84" y="50" width="36" height="28" rx="9" fill="url(#aca-purp-d)"/>
    <rect x="92" y="64" width="5" height="8" rx="2" fill="#faf5ff" opacity="0.85"/>
    <rect x="99" y="60" width="5" height="12" rx="2" fill="#ffffff" opacity="0.9"/>
    <rect x="106" y="62" width="5" height="10" rx="2" fill="#e9d5ff" opacity="0.95"/>
  </g>

  <g filter="url(#aca-shade-bot)" class="aca-bot">
    <path
      d="M 64 54 C 44 54 32 70 32 88 C 32 108 46 120 64 120 C 82 120 96 108 96 88 C 96 70 84 54 64 54 Z"
      fill="url(#aca-dome)"
      stroke="#e2e8f0"
      stroke-width="1.2"
    />
    <rect x="42" y="72" width="44" height="28" rx="11" fill="url(#aca-visor)" stroke="#334155" stroke-width="0.75"/>
    <rect x="42" y="72" width="44" height="9" rx="11" fill="#ffffff" opacity="0.07"/>
    <g class="aca-eye-pulse" filter="url(#aca-eye-glow)">
      <rect x="51" y="80" width="7" height="15" rx="3.5" fill="url(#aca-eye-l)"/>
      <rect x="70" y="80" width="7" height="15" rx="3.5" fill="url(#aca-eye-r)"/>
    </g>
  </g>

  <g class="aca-chart" opacity="0.98">
    <rect x="8" y="86" width="28" height="18" rx="5" fill="#ffffff" stroke="#c4b5fd" stroke-width="1"/>
    <rect x="14" y="94" width="4" height="6" rx="1" fill="#a855f7"/>
    <rect x="20" y="91" width="4" height="9" rx="1" fill="#7c3aed"/>
    <rect x="26" y="93" width="4" height="7" rx="1" fill="#c084fc"/>
  </g>
</svg>
